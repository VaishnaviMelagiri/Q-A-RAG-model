spring:
  application:
    name: qa-copilot
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ragdb}
    username: ${POSTGRES_USER:rag}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

# --- RAG configuration (all tunable via env; see .env.example) ---
rag:
  embedding:
    provider: mistral           # provider-agnostic: swap the embedding impl via config without touching business logic
    model: mistral-embed        # Mistral embedding model
    dimension: 1024             # mistral-embed output dim; MUST match vector(N) in V1__init.sql
  llm:
    provider: mistral
    model: mistral-small-latest # swappable Mistral chat model (used for generation in M2+)
    judge-temperature: 0.0      # relevance judge runs deterministic (0) so refuse/answer is
                                # repeatable run-to-run; generation/verify keep the warmer default.
  mistral:
    api-key: ${MISTRAL_API_KEY:} # REQUIRED, injected from environment; never hardcode. Empty
                                 # default so an unset var fails fast with a clear message
                                 # (see MissingApiKeyFailureAnalyzer) instead of leaking a placeholder.
    base-url: https://api.mistral.ai/v1
    embed-batch-size: 100
  http:                          # timeouts on all outbound provider calls (embedding + LLM), so a
                                 # hung provider socket can't pin a Tomcat thread forever
    connect-timeout-ms: 5000     # short: can't even connect -> fail fast
    read-timeout-ms: 60000       # generous: LLM generation can take tens of seconds
  ingest:
    max-file-bytes: 10000000     # per-file upload cap (10 MB); over-size -> HTTP 400
  chunking:
    max-chars: 1000
    overlap-chars: 150
    min-chars: 300              # don't snap a boundary earlier than this into a chunk
  retrieval:
    top-k: 5
  gate:
    # LAYER 1 of the relevance guardrail: a LOOSE similarity pre-filter (the ONE numeric gate).
    # It only drops obvious noise without spending an LLM call; the PRIMARY relevance decision is
    # the LLM judge (layer 2). Kept low on purpose.
    #
    # Reference: for mistral-embed on the OS-notes corpus (2026-07-05), in-corpus questions
    # scored 0.79-0.84 and out-of-corpus 0.63-0.67. A strict single-threshold gate would sit
    # ~0.75; here we deliberately set it to 0.5 so the pre-filter rarely refuses on its own and
    # the judge does the real work. Raise it if you want a cheaper first cut before the judge.
    similarity-threshold: 0.5

logging:
  level:
    com.qacopilot: INFO
