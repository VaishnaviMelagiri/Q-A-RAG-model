server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow document uploads through the proxy (matches the backend's 50MB multipart limit).
    client_max_body_size 50m;

    # Reverse-proxy API calls to the backend service. The browser only ever talks to this origin,
    # so there is no CORS — the production equivalent of the Vite dev proxy. No trailing slash on
    # proxy_pass, so the full "/api/..." path is preserved for the backend.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;   # LLM calls (judge -> generate -> verify) can take a few seconds
    }

    # SPA fallback: serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
